<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outdoor Clothes</title>
  <link rel="stylesheet" href="category.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kavoon&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="btn_wrap">
                <a href="index.html" class="back_btn">← Back</a>
            </div>
            <h2 class="title">Outdoor Clothes &#x26C5;</h2>
            <div class="grid">
                <div class="card dress">
                    <img src="images/baby_suit.png" alt="dress">
                    <p>Dress <span class="circle">7</span></p>
                </div>

                <div class="card jeans">
                    <img src="images/jeans.png" alt="jeans">
                    <p>Jeans <span class="circle">3</span></p>
                </div>

                <div class="card top">
                    <img src="images/top.png" alt="top">
                    <p>Top <span class="circle">2</span></p>
                </div>

                <div class="card accessories">
                    <img src="images/accessories.png" alt="accessories">
                    <p>Accessories <span class="circle">4</span></p>
                </div>

                <div class="card footwear">
                    <img src="images/shoes.png" alt="footwear">
                    <p>Footwear <span class="circle">2</span></p>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
