<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outdoor Clothes</title>
  <link rel="stylesheet" href="category.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kavoon&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="btn_wrap">
            <a href="index.html" class="back_btn">← Back</a>
        </div>
        <h2>Outdoor Clothes &#x26C5;</h2>
        <div class="card">
            <div class="item-wrap">
                <div class="square dress">
                    <img src="images/baby_suit.png" alt="dress">
                </div>
                <div class="item">
                   <h4>Dress <span class="circle">7</span></h4>
                </div>
            </div>
            <div class="item-wrap">
                <div class="square jeans">
                    <img src="images/jeans.png" alt="jeans">
                </div>
                <div class="item">
                   <h4>Jeans <span class="circle">3</span></h4>
                </div>
            </div>
            <div class="item-wrap">
                <div class="square top">
                    <img src="images/top.png" alt="top">
                </div>
                <div class="item">
                   <h4>Top <span class="circle">2</span></h4>
                </div>
            </div>
            <div class="item-wrap">
                <div class="square accessories">
                    <img src="images/accessories.png" alt="accessories">
                </div>
                <div class="item">
                   <h4>Accessories <span class="circle">4</span></h4>
                </div>
            </div>
            <div class="item-wrap">
                <div class="square footwear">
                    <img src="images/shoes.png" alt="footwear">
                </div>
                <div class="item">
                   <h4>Footwear <span class="circle">2</span></h4>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
